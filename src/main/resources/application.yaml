spring:
  application:
    name: SpringAI-Demo
  datasource:
    url: jdbc:mysql://localhost:3306/chatdb1
    username: pratik
    password: pratik2001
    driver-class-name: com.mysql.jdbc.Driver
  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      chat:
        options:
          model: gpt-4o-mini
    anthropic:
      api-key: ${ANTHROPIC_KEY}
      chat:
        options:
          model: claude-haiku-4-5
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always


logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG
  pattern:
    console: "%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n"
